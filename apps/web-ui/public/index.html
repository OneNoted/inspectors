<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Computer Use Oversight</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel controls">
        <h1>Agent Computer Use</h1>
        <p class="subtle">Linux sandbox / desktop-use oversight UI</p>
        <label>
          Provider
          <select id="session-provider">
            <option value="xvfb">Local Xvfb</option>
            <option value="qemu">QEMU VM</option>
          </select>
        </label>
        <div id="qemu-options" hidden>
          <label>
            QEMU profile
            <select id="qemu-profile">
              <option value="product">Product guest (Ubuntu + GNOME)</option>
              <option value="regression">Regression fixture</option>
            </select>
          </label>
          <label>
            Shared host path
            <input id="shared-host-path" type="text" value="../taskers" />
          </label>
        </div>
        <button id="create-session">Create session</button>
        <button id="refresh-session">Refresh</button>
        <p id="session-summary" class="status-line">No session</p>
        <pre id="session-meta">No session</pre>
        <label>
          Task description
          <textarea id="task-description">Launch Taskers inside the VM, create a new workspace, and capture proof artifacts.</textarea>
        </label>
        <button id="create-task">Create task</button>
        <div class="task-controls">
          <button data-task-action="pause">Pause</button>
          <button data-task-action="resume">Resume</button>
          <button data-task-action="complete">Complete</button>
          <button data-task-action="reset">Reset</button>
          <button data-task-action="terminate">Terminate</button>
        </div>
        <label>
          Manual action payload
          <textarea id="action-payload">{
  "kind": "run_command",
  "command": "echo ready"
}</textarea>
        </label>
        <button id="run-action">Run action</button>
      </section>
      <section class="panel desktop">
        <div class="desktop-header">
          <div>
            <h2 id="desktop-panel-title">Live desktop view</h2>
            <p id="live-view-trust" class="subtle live-view-trust">No session selected.</p>
          </div>
          <div class="desktop-actions">
            <span id="live-view-badge" class="status-badge">Unavailable</span>
            <a id="viewer-link" href="#" target="_blank" rel="noreferrer" hidden>Open debug viewer</a>
          </div>
        </div>
        <iframe id="viewer-frame" title="Live VM viewer" hidden></iframe>
        <img id="desktop-image" alt="Desktop screenshot" hidden />
        <div id="desktop-placeholder" class="desktop-placeholder">Live desktop unavailable</div>
        <pre id="observation"></pre>
      </section>
      <section class="panel history">
        <h2>Action history</h2>
        <pre id="history"></pre>
      </section>
      <section class="panel logs">
        <h2>Tasks / logs</h2>
        <pre id="tasks"></pre>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
