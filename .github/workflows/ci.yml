name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Install npm deps
        run: npm install
      - name: Build TypeScript packages
        run: npm run build
      - name: Rust tests
        run: cargo test
